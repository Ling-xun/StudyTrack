plugins {
    id "com.android.application"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}
def studyTrackAppUrl = localProperties.getProperty("studytrack.app.url", "https://your-domain.example")

android {
    namespace "com.studytrack.mobile"
    compileSdk 36

    defaultConfig {
        applicationId "com.studytrack.mobile"
        minSdk 23
        targetSdk 36
        versionCode 2
        versionName "1.0.1"
        buildConfigField "String", "APP_URL", "\"${studyTrackAppUrl}\""
    }

    buildFeatures {
        buildConfig true
    }
}
