services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studytrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-studytrack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-studytrack}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-studytrack}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3000"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start"

volumes:
  postgres-data:
